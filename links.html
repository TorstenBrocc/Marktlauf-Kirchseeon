<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alle Links | ATSV Kirchseeon Marktlauf</title>
    <meta name="description" content="Alle wichtigen Links zum Marktlauf Kirchseeon des ATSV Kirchseeon: Anmeldung, Infos, Ergebnisse und Social Media auf einen Blick.">
    <!-- Link-Hub für die Social-Media-Bios (Instagram/Facebook „Link in Bio"). Bewusst noindex: dünne Linkliste, kein Suchziel. -->
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="assets/images/ATSV_Logo-750x968.png">
    <style>
        :root {
            --primary: #009640;
            --primary-dark: #007230;
            --accent: #ff6b35;
            --ink: #1a1a1a;
            --paper: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--ink);
            min-height: 100vh;
            padding: 2.5rem 1.25rem 3rem;
            display: flex;
            justify-content: center;
        }
        .hub {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hub-logo {
            width: 96px;
            height: auto;
            background: #fff;
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18);
        }
        h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin: 1rem 0 0.25rem;
            letter-spacing: 0.3px;
        }
        .hub-sub {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 1.75rem;
        }
        nav.links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .link-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--paper);
            color: var(--ink);
            text-decoration: none;
            font-size: 1.02rem;
            font-weight: 600;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .link-btn:hover, .link-btn:focus {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }
        .link-btn .ico { font-size: 1.25rem; line-height: 1; width: 1.6rem; text-align: center; }
        .link-btn.social { background: rgba(255,255,255,0.14); color: #fff; }
        .link-btn.social:hover { background: rgba(255,255,255,0.22); }
        .hub-footer {
            margin-top: 2rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
            text-align: center;
        }
        .hub-footer a { color: #fff; }
    </style>
</head>
<body>
    <header class="hub">
        <img src="assets/images/ATSV_Logo-750x968.png" alt="ATSV Kirchseeon Logo" class="hub-logo">
        <h1>Marktlauf Kirchseeon</h1>
        <p class="hub-sub">ATSV Kirchseeon e.V. · alle Links auf einen Blick</p>

        <main>
            <nav class="links" aria-label="Wichtige Links">
                <a class="link-btn" href="/#anmeldung"><span class="ico" aria-hidden="true">📝</span> Zur Anmeldung</a>
                <a class="link-btn" href="/"><span class="ico" aria-hidden="true">🏃</span> Alle Infos zum Marktlauf</a>
                <a class="link-btn" href="/#distanzen"><span class="ico" aria-hidden="true">📏</span> Distanzen &amp; Strecke</a>
                <a class="link-btn" href="/#ablauf"><span class="ico" aria-hidden="true">🕒</span> Zeitplan</a>
                <a class="link-btn" href="/#sponsoren"><span class="ico" aria-hidden="true">🤝</span> Sponsoren &amp; Partner</a>
                <a class="link-btn" href="/#connect"><span class="ico" aria-hidden="true">✉️</span> Kontakt</a>

                <!--
                  NOCH ZU BESTÄTIGEN (URL fehlt) — nach Freigabe einkommentieren:
                  <a class="link-btn" href="NEWSLETTER_URL"><span class="ico" aria-hidden="true">📬</span> Newsletter abonnieren</a>
                  <a class="link-btn" href="RACERESULT_ERGEBNIS_URL"><span class="ico" aria-hidden="true">🏅</span> Ergebnisse (nach dem Renntag)</a>
                  <a class="link-btn" href="WHATSAPP_KANAL_URL"><span class="ico" aria-hidden="true">💬</span> WhatsApp-Kanal</a>
                -->

                <a class="link-btn social" href="https://www.instagram.com/atsv_marktlauf_kirchseeon" target="_blank" rel="noopener">
                    <span class="ico" aria-hidden="true">📸</span> Instagram
                </a>
                <a class="link-btn social" href="https://www.facebook.com/profile.php?id=61591689790244" target="_blank" rel="noopener">
                    <span class="ico" aria-hidden="true">👍</span> Facebook
                </a>
            </nav>
        </main>

        <footer class="hub-footer">
            <a href="/impressum.html">Impressum &amp; Datenschutz</a>
        </footer>
    </header>
</body>
</html>
