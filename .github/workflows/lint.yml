name: PHP Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php-lint:
    name: php -l
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Syntax check all PHP files
        run: |
          find . -type d \( -name vendor -o -name venv -o -name node_modules -o -name .git \) -prune \
            -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l
